services:
  - type: web
    name: assetflow-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.4
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 1440
      - key: DATABASE_URL
        fromDatabase:
          name: assetflow-db
          property: connectionString

  - type: web
    name: assetflow-frontend
    env: node
    plan: free
    rootDir: frontend/resource-flow-core
    buildCommand: npm install && npm run build
    startCommand: node .output/server/index.mjs
    envVars:
      - key: VITE_API_BASE_URL
        value: https://assetflow-backend.onrender.com

databases:
  - name: assetflow-db
    databaseName: assetflow
    user: assetflow
    plan: free
